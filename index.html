<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just a moment | Numart</title>
    <link rel="icon" type="image/png" href="https://imagenes.numart.com.co/faviconTemporal.ico">
<style>
  :root {
    --rojo: #9333ea;
    --azul: #197bc2;
    --naranja: #ffb612;
    --verde: #10b981;
    --suave: cubic-bezier(0.65, 0, 0.35, 1);
  }

  body {
font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #f8f9fa;
    margin: 0;
  }

  .loader-container {
    position: relative;
    width: 200px;
    height: 200px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex: 1; 
  }

  .system {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: system-rotate 6s var(--suave) infinite;
  }

  .dot {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    mix-blend-mode: multiply; 
  }

  .dot-1 { background-color: var(--verde); animation: move-1 6s var(--suave) infinite; z-index: 4; }
  .dot-2 { background-color: var(--rojo); animation: move-2 6s var(--suave) infinite; z-index: 3; }
  .dot-3 { background-color: var(--azul); animation: move-3 6s var(--suave) infinite; z-index: 2; }
  .dot-4 { background-color: var(--naranja); animation: move-4 6s var(--suave) infinite; z-index: 1; }

  @keyframes system-rotate {
    0%, 30% { transform: rotate(0deg); }
    40% { transform: rotate(90deg); }
    60% { transform: rotate(270deg); }
    75% { transform: rotate(360deg); }
    75.1%, 100% { transform: rotate(0deg); }
  }

  @keyframes move-1 {
    0% { transform: translate(-54px, 0) scale(1); border-radius: 50%; }
    5% { transform: translate(-54px, -20px) scale(1); border-radius: 50%; }
    10%, 30% { transform: translate(-54px, 0) scale(1); border-radius: 50%; }
    40% { transform: translate(0, 0) scale(1); border-radius: 50%; }
    50%, 60% { transform: translate(0, -45px) scale(1.4); border-radius: 30%; }
    75% { transform: translate(0, 0) scale(1); border-radius: 50%; }
    85%, 100% { transform: translate(-54px, 0) scale(1); border-radius: 50%; }
  }

  @keyframes move-2 {
    0%, 5% { transform: translate(-18px, 0) scale(1); border-radius: 50%; }
    10% { transform: translate(-18px, -20px) scale(1); border-radius: 50%; }
    15%, 30% { transform: translate(-18px, 0) scale(1); border-radius: 50%; }
    40% { transform: translate(0, 0) scale(1); border-radius: 50%; }
    50%, 60% { transform: translate(45px, 0) scale(1.4); border-radius: 30%; }
    75% { transform: translate(0, 0) scale(1); border-radius: 50%; }
    85%, 100% { transform: translate(-18px, 0) scale(1); border-radius: 50%; }
  }

  @keyframes move-3 {
    0%, 10% { transform: translate(18px, 0) scale(1); border-radius: 50%; }
    15% { transform: translate(18px, -20px) scale(1); border-radius: 50%; }
    20%, 30% { transform: translate(18px, 0) scale(1); border-radius: 50%; }
    40% { transform: translate(0, 0) scale(1); border-radius: 50%; }
    50%, 60% { transform: translate(0, 45px) scale(1.4); border-radius: 30%; }
    75% { transform: translate(0, 0) scale(1); border-radius: 50%; }
    85%, 100% { transform: translate(18px, 0) scale(1); border-radius: 50%; }
  }

  @keyframes move-4 {
    0%, 15% { transform: translate(54px, 0) scale(1); border-radius: 50%; }
    20% { transform: translate(54px, -20px) scale(1); border-radius: 50%; }
    25%, 30% { transform: translate(54px, 0) scale(1); border-radius: 50%; }
    40% { transform: translate(0, 0) scale(1); border-radius: 50%; }
    50%, 60% { transform: translate(-45px, 0) scale(1.4); border-radius: 30%; }
    75% { transform: translate(0, 0) scale(1); border-radius: 50%; }
    85%, 100% { transform: translate(54px, 0) scale(1); border-radius: 50%; }
  }
  .mensaje-estado {
    color: #aaa;
    font-size: 15px;
    text-align: center;
    margin-bottom: 15px;
    opacity: 0;
    animation: fadeIn 1s ease forwards;
    animation-delay: 10s;
  }

  .mensaje-estado a {
    color: #aaa;
    text-decoration: underline;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

  <div class="loader-container">
    <div class="system">
      <div class="dot dot-1"></div>
      <div class="dot dot-2"></div>
      <div class="dot dot-3"></div>
      <div class="dot dot-4"></div>
    </div>
  </div>
 <p class="mensaje-estado">
    Actualmente estamos experimentando problemas. 
    Te recomendamos revisar nuestro 
    <a href="https://status.numart.com.co" target="_blank">estado del servicio</a>.
  </p>
</body>
</html>
